  <body style="margin:0;">
    <div id="root"></div>
    <!-- Decode half of the spa-github-pages redirect trick from public/404.html:
         restores the real path (e.g. /frameworks/soc2) before React Router mounts. -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
